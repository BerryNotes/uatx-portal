<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuggets from the Form of the Good</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Book+Antiqua&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
    overflow-x: hidden;
  }

  /* ─── Background ─── */

  .bg {
    position: fixed;
    inset: 0;
    background: url('/blog-bg.jpg') center / cover no-repeat;
    z-index: 0;
  }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
  }

  .bg::before {
    content: '';
    position: absolute;
    inset: -50% -50%;
    width: 200%;
    height: 200%;
    z-index: 1;
    background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(255,255,255,0.04) 0%, transparent 50%);
    animation: shimmer 12s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes shimmer {
    0%   { transform: translate(0%, 0%) rotate(0deg); opacity: 0.4; }
    33%  { transform: translate(5%, -3%) rotate(1deg); opacity: 0.7; }
    66%  { transform: translate(-3%, 4%) rotate(-0.5deg); opacity: 0.5; }
    100% { transform: translate(2%, -2%) rotate(0.5deg); opacity: 0.8; }
  }

  /* ─── Scroll container ─── */

  html { scrollbar-width: none; }
  html::-webkit-scrollbar { display: none; }

  .scroll-wrap {
    position: relative;
    z-index: 1;
    padding: 0 0 0 0;
  }

  /* ─── Quote items ─── */

  .quote {
    max-width: 720px;
    margin-left: 10vw;
    text-align: left;
    cursor: pointer;
    will-change: transform, filter, opacity;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .quote-text {
    font-family: 'Book Antiqua', 'Palatino Linotype', 'Palatino', Georgia, serif;
    font-size: 1.9rem;
    font-weight: normal;
    line-height: 1.55;
    letter-spacing: 0.01em;
    color: rgba(255, 255, 255, 0.95);
  }

  .quote-date {
    margin-top: 20px;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.35);
  }

  /* ─── Controls ─── */

  .controls {
    position: fixed;
    top: 24px;
    right: 28px;
    z-index: 10;
    display: flex;
    gap: 10px;
  }

  .ctrl-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    background: rgba(0,0,0,0.4);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .ctrl-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.5);
  }

  .ctrl-btn-danger { border-color: rgba(180,60,60,0.5); color: rgba(220,100,100,0.8); }
  .ctrl-btn-danger:hover { background: rgba(180,60,60,0.3); color: #fff; }

  /* ─── Empty state ─── */

  .empty {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
  }

  .empty p {
    font-size: 1rem;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.04em;
  }

  /* ─── Post detail overlay ─── */

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 20;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow-y: auto;
  }

  .overlay.open { display: flex; align-items: center; justify-content: center; }

  .overlay-inner {
    max-width: 640px;
    width: 100%;
    padding: 80px 48px;
    text-align: center;
    margin: 0 auto;
  }

  .overlay-text {
    font-family: 'Book Antiqua', 'Palatino Linotype', 'Palatino', Georgia, serif;
    font-size: 2rem;
    font-weight: normal;
    line-height: 1.55;
    letter-spacing: 0.01em;
    color: rgba(255,255,255,0.95);
  }

  .overlay-text p { margin-bottom: 1em; }

  .overlay-date {
    margin-top: 32px;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .overlay-actions {
    margin-top: 40px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .overlay-close {
    position: fixed;
    top: 24px;
    left: 28px;
    z-index: 21;
  }

  /* ─── Editor overlay ─── */

  .editor {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 30;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    align-items: center;
    justify-content: center;
  }

  .editor.open { display: flex; }

  .editor-inner {
    width: 100%;
    max-width: 560px;
    padding: 48px;
  }

  .editor-inner textarea {
    width: 100%;
    min-height: 200px;
    font-family: 'Inter', sans-serif;
    font-size: 1.3rem;
    font-weight: 300;
    line-height: 1.6;
    color: #fff;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding: 16px 0;
    outline: none;
    resize: vertical;
    text-align: center;
  }

  .editor-inner textarea::placeholder { color: rgba(255,255,255,0.2); }

  .editor-actions {
    margin-top: 28px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  /* ─── Scroll indicator ─── */

  .scroll-track {
    position: fixed;
    left: 5vw;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 50vh;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    z-index: 5;
    pointer-events: none;
  }

  .scroll-thumb {
    position: absolute;
    top: 0;
    left: -1px;
    width: 4px;
    height: 20px;
    background: rgba(255,255,255,0.35);
    border-radius: 2px;
    transition: top 0.6s cubic-bezier(0.25, 0.1, 0.25, 1), height 0.3s ease;
  }

  /* ─── Floating reactions ─── */

  .floater-container {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .floater {
    position: absolute;
    animation: float-drift var(--duration) ease-in-out infinite;
    animation-delay: var(--delay);
  }

  .floater-heart {
    color: rgba(255, 255, 255, var(--float-opacity));
  }

  .floater-comment {
    font-family: 'Inter', sans-serif;
    color: rgba(255, 255, 255, var(--float-opacity));
    max-width: 180px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  @keyframes float-drift {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(var(--dx), var(--dy)); }
    50% { transform: translate(calc(var(--dx) * -0.7), calc(var(--dy) * 0.5)); }
    75% { transform: translate(calc(var(--dx) * 0.3), calc(var(--dy) * -0.8)); }
  }

  .floater-burst {
    position: absolute;
    animation: floater-burst 2s ease-out forwards !important;
    pointer-events: none;
  }

  @keyframes floater-burst {
    0% { transform: scale(0.5) translateY(0); opacity: 0.7; }
    100% { transform: scale(1.3) translateY(-180px); opacity: 0; }
  }

  /* ─── Reaction bar ─── */

  .reaction-bar {
    position: fixed;
    bottom: 32px;
    left: 10vw;
    z-index: 8;
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .reaction-bar.visible { opacity: 1; }

  .react-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s;
    padding: 4px 0;
    letter-spacing: 0.04em;
  }

  .react-btn:hover { color: rgba(255,255,255,0.8); }
  .react-btn .icon { font-size: 0.9rem; }

  .comment-form {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .comment-form input {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 300;
    color: #fff;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 5px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .comment-form input:focus { border-color: rgba(255,255,255,0.3); }
  .comment-form input::placeholder { color: rgba(255,255,255,0.18); }
  .comment-form input.text-input { width: 220px; }

  .comment-form .send-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    transition: color 0.2s;
  }

  .comment-form .send-btn:hover { color: #fff; }

  /* ─── View hidden ─── */
  .view-hidden { display: none !important; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="floater-container" id="floater-container"></div>

<div class="controls" id="controls">
  <button class="ctrl-btn" onclick="openEditor()">+</button>
</div>

<div class="scroll-track" id="scroll-track"><div class="scroll-thumb" id="scroll-thumb"></div></div>
<div class="scroll-wrap" id="scroll-wrap"></div>

<div class="reaction-bar" id="reaction-bar">
  <button class="react-btn" onclick="likePost()"><span class="icon">♡</span> <span id="like-count">0</span></button>
  <button class="react-btn" onclick="toggleCommentForm()"><span class="icon">💬</span> <span id="comment-count">0</span></button>
  <div class="comment-form view-hidden" id="comment-form">
    <input type="text" class="text-input" id="comment-text" placeholder="Add a comment..." onkeydown="if(event.key==='Enter')submitComment()">
    <button class="send-btn" onclick="submitComment()">Send</button>
  </div>
</div>

<div class="empty view-hidden" id="empty-state">
  <p>Nothing here yet.</p>
  <button class="ctrl-btn" onclick="openEditor()">Add a quote</button>
</div>

<!-- Post detail overlay -->
<div class="overlay" id="overlay">
  <a class="ctrl-btn overlay-close" onclick="closeOverlay()">Back</a>
  <div class="overlay-inner">
    <div class="overlay-text" id="overlay-text"></div>
    <div class="overlay-date" id="overlay-date"></div>
    <div class="overlay-actions" id="overlay-actions">
      <button class="ctrl-btn" onclick="editCurrent()">Edit</button>
      <button class="ctrl-btn ctrl-btn-danger" onclick="deleteCurrent()">Delete</button>
    </div>
  </div>
</div>

<!-- Editor overlay -->
<div class="editor" id="editor">
  <div class="editor-inner">
    <textarea id="editor-content" placeholder="Write a quote..." rows="4"></textarea>
    <div class="editor-actions">
      <button class="ctrl-btn" onclick="saveQuote()">Publish</button>
      <button class="ctrl-btn" onclick="closeEditor()">Cancel</button>
    </div>
  </div>
</div>

<script>
  let posts = [];
  let currentPostId = null;
  let editingPostId = null;
  // ─── API ───

  async function fetchPosts() {
    const res = await fetch('/api/blog/posts');
    const data = await res.json();
    posts = data.posts;
    render();
  }

  async function fetchPost(id) {
    const res = await fetch(`/api/blog/posts/${id}`);
    const data = await res.json();
    return data.post;
  }

  async function saveQuote() {
    const raw = document.getElementById('editor-content').value.trim();
    if (!raw) return;

    const content = raw.split(/\n{2,}/).filter(p => p.trim()).map(p =>
      `<p>${escapeHtml(p.trim()).replace(/\n/g, '<br>')}</p>`
    ).join('\n');

    // Use first line as title (for the API)
    const title = raw.split('\n')[0].substring(0, 120);
    const url = editingPostId ? `/api/blog/posts/${editingPostId}` : '/api/blog/posts';
    const method = editingPostId ? 'PUT' : 'POST';

    const res = await fetch(url, {
      method, headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content }),
    });
    if (!res.ok) return alert('Failed to save');

    editingPostId = null;
    closeEditor();
    await fetchPosts();
  }

  async function deleteCurrent() {
    if (!currentPostId || !confirm('Delete this quote?')) return;
    await fetch(`/api/blog/posts/${currentPostId}`, { method: 'DELETE' });
    currentPostId = null;
    closeOverlay();
    await fetchPosts();
  }

  // ─── Helpers ───

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function stripHtml(html) {
    return html.replace(/<br\s*\/?>/gi, '\n').replace(/<\/?[^>]+(>|$)/g, '')
      .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'").trim();
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'Z');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  // ─── Render ───

  function render() {
    const wrap = document.getElementById('scroll-wrap');
    const empty = document.getElementById('empty-state');

    if (posts.length === 0) {
      wrap.innerHTML = '';
      empty.classList.remove('view-hidden');
      return;
    }

    empty.classList.add('view-hidden');
    wrap.innerHTML = posts.map(p => {
      const text = stripHtml(p.excerpt || '');
      return `<div class="quote" data-id="${p.id}" onclick="openPost(${p.id})">
        <div class="quote-text">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
        <div class="quote-date">${formatDate(p.created_at)}</div>
      </div>`;
    }).join('');

    updateBlur();
    scheduleReactionLoad();
  }

  // ─── Scroll blur effect ───

  function updateBlur() {
    const quotes = document.querySelectorAll('.quote');
    const center = window.innerHeight / 2;
    const arcMaxShift = 220;

    quotes.forEach(q => {
      const rect = q.getBoundingClientRect();
      const qCenter = rect.top + rect.height / 2;
      const dist = Math.abs(qCenter - center);
      const maxDist = window.innerHeight * 0.6;
      const t = Math.min(dist / maxDist, 1);

      const blur = t * 6;
      const opacity = 1 - t * 0.65;
      const xShift = t * t * arcMaxShift;

      q.style.filter = `blur(${blur}px)`;
      q.style.opacity = opacity;
      q.style.transform = `translateX(${xShift}px)`;
    });

    updateScrollIndicator();
  }

  function updateScrollIndicator() {
    const quotes = document.querySelectorAll('.quote');
    const thumb = document.getElementById('scroll-thumb');
    const track = document.getElementById('scroll-track');
    if (quotes.length < 2) { track.style.opacity = 0; return; }
    track.style.opacity = 1;

    const trackH = track.offsetHeight;
    const progress = targetIndex / (quotes.length - 1);
    const thumbH = Math.max(12, trackH / quotes.length);
    const thumbTop = progress * (trackH - thumbH);

    thumb.style.height = thumbH + 'px';
    thumb.style.top = thumbTop + 'px';
  }

  // ─── Smooth snap scroll ───

  let targetIndex = 0;
  let animId = null;
  let scrollFrom = 0;
  let scrollTo = 0;
  let scrollStart = 0;
  let scrollDuration = 2400;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function getQuoteTarget(index) {
    const quotes = document.querySelectorAll('.quote');
    if (quotes.length === 0) return 0;
    const el = quotes[index];
    const rect = el.getBoundingClientRect();
    return window.scrollY + rect.top + rect.height / 2 - window.innerHeight / 2;
  }

  function snapTo(index, duration) {
    const quotes = document.querySelectorAll('.quote');
    if (quotes.length === 0) return;
    index = Math.max(0, Math.min(index, quotes.length - 1));
    targetIndex = index;
    scheduleReactionLoad();

    scrollFrom = window.scrollY;
    scrollTo = getQuoteTarget(index);
    scrollStart = performance.now();
    scrollDuration = duration || 2400;

    if (!animId) tick();
  }

  function tick() {
    const now = performance.now();
    const elapsed = now - scrollStart;
    const t = Math.min(elapsed / scrollDuration, 1);
    const pos = scrollFrom + (scrollTo - scrollFrom) * easeOut(t);

    window.scrollTo(0, pos);
    updateBlur();

    if (t < 1) {
      animId = requestAnimationFrame(tick);
    } else {
      animId = null;
    }
  }

  let wheelCooldown = false;
  let rapidCount = 0;
  let rapidTimer = null;

  window.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (wheelCooldown) return;
    wheelCooldown = true;
    setTimeout(() => { wheelCooldown = false; }, 120);

    const quotes = document.querySelectorAll('.quote');
    if (quotes.length === 0) return;

    // Track rapid scrolling
    rapidCount++;
    clearTimeout(rapidTimer);
    rapidTimer = setTimeout(() => { rapidCount = 0; }, 400);

    // Skip more quotes when scrolling rapidly
    const skip = rapidCount >= 5 ? 3 : rapidCount >= 3 ? 2 : 1;
    const dir = e.deltaY > 0 ? 1 : -1;
    const isMoving = animId !== null;
    const speed = rapidCount >= 3 ? 400 : (isMoving ? 800 : 2400);

    const next = targetIndex + dir * skip;
    snapTo(next, speed);
  }, { passive: false });


  window.addEventListener('resize', updateBlur);

  // ─── Overlays ───

  async function openPost(id) {
    const post = await fetchPost(id);
    if (!post) return;
    currentPostId = id;
    document.getElementById('overlay-text').innerHTML = post.content;
    document.getElementById('overlay-date').textContent = formatDate(post.created_at);
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
    currentPostId = null;
  }

  function openEditor(postId) {
    editingPostId = postId || null;
    document.getElementById('editor-content').value = '';

    if (editingPostId) {
      fetchPost(editingPostId).then(post => {
        if (post) document.getElementById('editor-content').value = stripHtml(post.content);
      });
    }

    document.getElementById('editor').classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('editor-content').focus();
  }

  function closeEditor() {
    document.getElementById('editor').classList.remove('open');
    if (!document.getElementById('overlay').classList.contains('open')) {
      document.body.style.overflow = '';
    }
  }

  function editCurrent() {
    closeOverlay();
    openEditor(currentPostId);
  }

  // ─── Reactions ───

  let activePostId = null;
  let reactionDebounce = null;
  let commentFormOpen = false;

  function getActivePostId() {
    if (posts.length === 0) return null;
    const idx = Math.max(0, Math.min(targetIndex, posts.length - 1));
    return posts[idx].id;
  }

  function scheduleReactionLoad() {
    clearTimeout(reactionDebounce);
    reactionDebounce = setTimeout(onActiveQuoteChange, 400);
  }

  function onActiveQuoteChange() {
    const pid = getActivePostId();
    if (pid === activePostId) return;
    activePostId = pid;
    if (!pid) {
      document.getElementById('reaction-bar').classList.remove('visible');
      clearFloaters();
      return;
    }
    document.getElementById('reaction-bar').classList.add('visible');
    loadReactions(pid);
  }

  async function loadReactions(postId) {
    try {
      const res = await fetch(`/api/blog/posts/${postId}/reactions`);
      const data = await res.json();
      document.getElementById('like-count').textContent = data.likes || 0;
      document.getElementById('comment-count').textContent = (data.comments || []).length;
      spawnFloaters(data.likes || 0, data.comments || []);
    } catch (e) { /* ignore */ }
  }

  function clearFloaters() {
    document.getElementById('floater-container').innerHTML = '';
  }

  function spawnFloaters(likeCount, comments) {
    clearFloaters();
    const container = document.getElementById('floater-container');
    const maxHearts = Math.min(likeCount, 15);
    for (let i = 0; i < maxHearts; i++) {
      container.appendChild(createFloater('\u2661', 'heart'));
    }
    const cmts = comments.slice(0, 10);
    for (const c of cmts) {
      container.appendChild(createFloater(c.content.substring(0, 40), 'comment'));
    }
  }

  function createFloater(text, type) {
    const el = document.createElement('div');
    el.className = 'floater floater-' + type;
    el.textContent = text;
    const left = 3 + Math.random() * 42;
    const top = 5 + Math.random() * 85;
    const duration = 6 + Math.random() * 10;
    const delay = Math.random() * 4;
    const opacity = type === 'heart' ? (0.08 + Math.random() * 0.17) : (0.06 + Math.random() * 0.12);
    const size = type === 'heart' ? (0.8 + Math.random() * 0.7) : (0.6 + Math.random() * 0.2);
    const dx = (Math.random() - 0.5) * 240;
    const dy = (Math.random() - 0.5) * 200;
    el.style.cssText = `left:${left}%;top:${top}%;font-size:${size}rem;`
      + `--float-opacity:${opacity};--dx:${dx}px;--dy:${dy}px;`
      + `--duration:${duration}s;--delay:${delay}s;`;
    return el;
  }

  async function likePost() {
    if (!activePostId) return;
    try {
      const res = await fetch(`/api/blog/posts/${activePostId}/like`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
      });
      const data = await res.json();
      document.getElementById('like-count').textContent = data.likes || '';
      spawnBurstHeart();
      document.getElementById('floater-container').appendChild(createFloater('\u2661', 'heart'));
    } catch (e) { /* ignore */ }
  }

  function spawnBurstHeart() {
    const container = document.getElementById('floater-container');
    const el = document.createElement('div');
    el.className = 'floater-burst';
    el.textContent = '\u2661';
    el.style.cssText = `left:${5 + Math.random() * 30}%;bottom:60px;font-size:1.6rem;color:rgba(255,255,255,0.6);`;
    container.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  function toggleCommentForm() {
    commentFormOpen = !commentFormOpen;
    document.getElementById('comment-form').classList.toggle('view-hidden', !commentFormOpen);
    if (commentFormOpen) document.getElementById('comment-text').focus();
  }

  async function submitComment() {
    const content = document.getElementById('comment-text').value.trim();
    if (!content || !activePostId) return;
    try {
      await fetch(`/api/blog/posts/${activePostId}/comment`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });
      document.getElementById('comment-text').value = '';
      const count = parseInt(document.getElementById('comment-count').textContent || '0') + 1;
      document.getElementById('comment-count').textContent = count;
      document.getElementById('floater-container').appendChild(createFloater(content.substring(0, 40), 'comment'));
    } catch (e) { /* ignore */ }
  }

  // ─── Init ───
  fetchPosts();
</script>
</body>
</html>
