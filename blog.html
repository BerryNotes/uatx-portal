<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal</title>
<link rel="icon" type="image/png" href="/images/Home/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Book+Antiqua&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
    overflow-x: hidden;
  }

  /* ─── Background ─── */

  .bg {
    position: fixed;
    inset: 0;
    background: url('/blog-bg.jpg') center / cover no-repeat;
    z-index: 0;
  }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
  }

  .bg::before {
    content: '';
    position: absolute;
    inset: -50% -50%;
    width: 200%;
    height: 200%;
    z-index: 1;
    background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(255,255,255,0.04) 0%, transparent 50%);
    animation: shimmer 12s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes shimmer {
    0%   { transform: translate(0%, 0%) rotate(0deg); opacity: 0.4; }
    33%  { transform: translate(5%, -3%) rotate(1deg); opacity: 0.7; }
    66%  { transform: translate(-3%, 4%) rotate(-0.5deg); opacity: 0.5; }
    100% { transform: translate(2%, -2%) rotate(0.5deg); opacity: 0.8; }
  }

  /* ─── Ambient light orbs ─── */

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 1;
    pointer-events: none;
  }

  .bg-orb-1 {
    width: 60vw; height: 60vw;
    top: -20%; left: -15%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
    animation: orb1 20s ease-in-out infinite alternate;
  }

  .bg-orb-2 {
    width: 50vw; height: 50vw;
    bottom: -15%; right: -10%;
    background: radial-gradient(circle, rgba(180,200,255,0.12) 0%, transparent 70%);
    animation: orb2 25s ease-in-out infinite alternate;
  }

  .bg-orb-3 {
    width: 40vw; height: 40vw;
    top: 30%; left: 40%;
    background: radial-gradient(circle, rgba(255,230,200,0.1) 0%, transparent 70%);
    animation: orb3 18s ease-in-out infinite alternate;
  }

  @keyframes orb1 {
    0%   { transform: translate(0, 0) scale(1); opacity: 0.4; }
    50%  { transform: translate(15vw, 10vh) scale(1.2); opacity: 0.8; }
    100% { transform: translate(5vw, 20vh) scale(0.9); opacity: 0.5; }
  }

  @keyframes orb2 {
    0%   { transform: translate(0, 0) scale(1); opacity: 0.3; }
    50%  { transform: translate(-10vw, -15vh) scale(1.3); opacity: 0.7; }
    100% { transform: translate(-5vw, -5vh) scale(1.1); opacity: 0.4; }
  }

  @keyframes orb3 {
    0%   { transform: translate(0, 0) scale(1); opacity: 0.3; }
    50%  { transform: translate(-20vw, 10vh) scale(1.15); opacity: 0.7; }
    100% { transform: translate(-10vw, -10vh) scale(0.95); opacity: 0.4; }
  }

  /* ─── Film grain ─── */

  .grain {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    z-index: 1;
    pointer-events: none;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    animation: grain 0.5s steps(1) infinite;
  }

  @keyframes grain {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-5%, 5%); }
    50%  { transform: translate(5%, -5%); }
    75%  { transform: translate(-2%, -8%); }
    100% { transform: translate(7%, 2%); }
  }

  /* ─── Scroll container ─── */

  html { scrollbar-width: none; }
  html::-webkit-scrollbar { display: none; }

  .scroll-wrap {
    position: relative;
    z-index: 1;
    padding: 0 0 0 0;
  }

  /* ─── Quote items ─── */

  .quote {
    max-width: 720px;
    margin-left: 10vw;
    text-align: left;
    cursor: pointer;
    will-change: transform, filter, opacity;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .quote-text {
    font-family: 'Book Antiqua', 'Palatino Linotype', 'Palatino', Georgia, serif;
    font-size: 1.9rem;
    font-weight: normal;
    line-height: 1.55;
    letter-spacing: 0.01em;
    color: rgba(255, 255, 255, 0.95);
  }

  .quote-date {
    margin-top: 20px;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.35);
  }

  /* ─── Controls ─── */

  .controls {
    position: fixed;
    top: 24px;
    right: 28px;
    z-index: 10;
    display: flex;
    gap: 10px;
  }

  .ctrl-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    background: rgba(0,0,0,0.4);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .ctrl-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.5);
  }

  .ctrl-btn-danger { border-color: rgba(180,60,60,0.5); color: rgba(220,100,100,0.8); }
  .ctrl-btn-danger:hover { background: rgba(180,60,60,0.3); color: #fff; }

  /* ─── Empty state ─── */

  .empty {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
  }

  .empty p {
    font-size: 1rem;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.04em;
  }

  /* ─── Post detail overlay ─── */

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 20;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow-y: auto;
  }

  .overlay.open { display: flex; align-items: center; justify-content: center; }

  .overlay-inner {
    max-width: 640px;
    width: 100%;
    padding: 80px 48px;
    text-align: center;
    margin: 0 auto;
  }

  .overlay-text {
    font-family: 'Book Antiqua', 'Palatino Linotype', 'Palatino', Georgia, serif;
    font-size: 2rem;
    font-weight: normal;
    line-height: 1.55;
    letter-spacing: 0.01em;
    color: rgba(255,255,255,0.95);
  }

  .overlay-text p { margin-bottom: 1em; }

  .overlay-date {
    margin-top: 32px;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .overlay-actions {
    margin-top: 40px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .overlay-close {
    position: fixed;
    top: 24px;
    left: 28px;
    z-index: 21;
  }

  /* ─── Editor overlay ─── */

  .editor {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 30;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    align-items: center;
    justify-content: center;
  }

  .editor.open { display: flex; }

  .editor-inner {
    width: 100%;
    max-width: 560px;
    padding: 48px;
  }

  .editor-inner textarea {
    width: 100%;
    min-height: 200px;
    font-family: 'Inter', sans-serif;
    font-size: 1.3rem;
    font-weight: 300;
    line-height: 1.6;
    color: #fff;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding: 16px 0;
    outline: none;
    resize: vertical;
    text-align: center;
  }

  .editor-inner textarea::placeholder { color: rgba(255,255,255,0.2); }

  .editor-actions {
    margin-top: 28px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  /* ─── Scroll indicator ─── */

  .scroll-track {
    position: fixed;
    left: 5vw;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 50vh;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .scroll-track.visible {
    opacity: 1;
  }

  .scroll-thumb {
    position: absolute;
    top: 0;
    left: -1px;
    width: 4px;
    height: 20px;
    background: rgba(255,255,255,0.35);
    border-radius: 2px;
    transition: top 0.6s cubic-bezier(0.25, 0.1, 0.25, 1), height 0.3s ease;
  }

  /* ─── View hidden ─── */
  .view-hidden { display: none !important; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div class="grain"></div>

<div class="controls" id="controls">
  <button class="ctrl-btn" onclick="openEditor()">+</button>
</div>

<div class="scroll-track" id="scroll-track"><div class="scroll-thumb" id="scroll-thumb"></div></div>
<div class="scroll-wrap" id="scroll-wrap"></div>

<div class="empty view-hidden" id="empty-state">
  <p>Nothing here yet.</p>
  <button class="ctrl-btn" onclick="openEditor()">Add a quote</button>
</div>

<!-- Post detail overlay -->
<div class="overlay" id="overlay">
  <a class="ctrl-btn overlay-close" onclick="closeOverlay()">Back</a>
  <div class="overlay-inner">
    <div class="overlay-text" id="overlay-text"></div>
    <div class="overlay-date" id="overlay-date"></div>
    <div class="overlay-actions" id="overlay-actions">
      <button class="ctrl-btn" onclick="editCurrent()">Edit</button>
      <button class="ctrl-btn ctrl-btn-danger" onclick="deleteCurrent()">Delete</button>
    </div>
  </div>
</div>

<!-- Editor overlay -->
<div class="editor" id="editor">
  <div class="editor-inner">
    <textarea id="editor-content" placeholder="Write a quote..." rows="4"></textarea>
    <div class="editor-actions">
      <button class="ctrl-btn" onclick="saveQuote()">Publish</button>
      <button class="ctrl-btn" onclick="closeEditor()">Cancel</button>
    </div>
  </div>
</div>

<script>
  let posts = [];
  let currentPostId = null;
  let editingPostId = null;
  // ─── API ───

  async function fetchPosts() {
    const res = await fetch('/api/blog/posts');
    const data = await res.json();
    posts = data.posts;
    render();
  }

  async function fetchPost(id) {
    const res = await fetch(`/api/blog/posts/${id}`);
    const data = await res.json();
    return data.post;
  }

  async function saveQuote() {
    const raw = document.getElementById('editor-content').value.trim();
    if (!raw) return;

    const content = raw.split(/\n{2,}/).filter(p => p.trim()).map(p =>
      `<p>${escapeHtml(p.trim()).replace(/\n/g, '<br>')}</p>`
    ).join('\n');

    // Use first line as title (for the API)
    const title = raw.split('\n')[0].substring(0, 120);
    const url = editingPostId ? `/api/blog/posts/${editingPostId}` : '/api/blog/posts';
    const method = editingPostId ? 'PUT' : 'POST';

    const res = await fetch(url, {
      method, headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content }),
    });
    if (!res.ok) return alert('Failed to save');

    editingPostId = null;
    closeEditor();
    await fetchPosts();
  }

  async function deleteCurrent() {
    if (!currentPostId || !confirm('Delete this quote?')) return;
    await fetch(`/api/blog/posts/${currentPostId}`, { method: 'DELETE' });
    currentPostId = null;
    closeOverlay();
    await fetchPosts();
  }

  // ─── Helpers ───

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function stripHtml(html) {
    return html.replace(/<br\s*\/?>/gi, '\n').replace(/<\/?[^>]+(>|$)/g, '')
      .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'").trim();
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'Z');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  // ─── Render ───

  function render() {
    const wrap = document.getElementById('scroll-wrap');
    const empty = document.getElementById('empty-state');

    if (posts.length === 0) {
      wrap.innerHTML = '';
      empty.classList.remove('view-hidden');
      return;
    }

    empty.classList.add('view-hidden');
    wrap.innerHTML = posts.map(p => {
      const text = stripHtml(p.excerpt || '');
      return `<div class="quote" data-id="${p.id}" onclick="openPost(${p.id})">
        <div class="quote-text">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
        <div class="quote-date">${formatDate(p.created_at)}</div>
      </div>`;
    }).join('');

    updateBlur();
  }

  // ─── Scroll blur effect ───

  function updateBlur() {
    const quotes = document.querySelectorAll('.quote');
    const center = window.innerHeight / 2;
    const arcMaxShift = 220;

    quotes.forEach(q => {
      const rect = q.getBoundingClientRect();
      const qCenter = rect.top + rect.height / 2;
      const dist = Math.abs(qCenter - center);
      const maxDist = window.innerHeight * 0.6;
      const t = Math.min(dist / maxDist, 1);

      const blur = t * 6;
      const opacity = 1 - t * 0.65;
      const xShift = t * t * arcMaxShift;

      q.style.filter = `blur(${blur}px)`;
      q.style.opacity = opacity;
      q.style.transform = `translateX(${xShift}px)`;
    });

    updateScrollIndicator();
  }

  function updateScrollIndicator() {
    const quotes = document.querySelectorAll('.quote');
    const thumb = document.getElementById('scroll-thumb');
    const track = document.getElementById('scroll-track');
    if (quotes.length < 2) { track.classList.remove('visible'); return; }

    const trackH = track.offsetHeight;
    const scrollMax = document.documentElement.scrollHeight - window.innerHeight;
    const progress = scrollMax > 0 ? window.scrollY / scrollMax : 0;
    const thumbH = Math.max(12, trackH / quotes.length);
    const thumbTop = progress * (trackH - thumbH);

    thumb.style.height = thumbH + 'px';
    thumb.style.top = thumbTop + 'px';
  }

  // ─── Free scroll with gentle settle ───

  let settleTimer = null;
  let settleAnim = null;

  function getClosestIndex() {
    const quotes = document.querySelectorAll('.quote');
    if (quotes.length === 0) return 0;
    const center = window.innerHeight / 2;
    let closest = 0;
    let closestDist = Infinity;
    quotes.forEach((q, i) => {
      const rect = q.getBoundingClientRect();
      const dist = Math.abs(rect.top + rect.height / 2 - center);
      if (dist < closestDist) { closestDist = dist; closest = i; }
    });
    return closest;
  }

  function settleToNearest() {
    const quotes = document.querySelectorAll('.quote');
    if (quotes.length === 0) return;
    const idx = getClosestIndex();
    const el = quotes[idx];
    const rect = el.getBoundingClientRect();
    const target = window.scrollY + rect.top + rect.height / 2 - window.innerHeight / 2;
    const dist = Math.abs(target - window.scrollY);

    if (dist < 2) return; // already close enough

    const from = window.scrollY;
    const start = performance.now();
    const duration = Math.min(1200, Math.max(400, dist * 2));

    if (settleAnim) cancelAnimationFrame(settleAnim);

    function animate() {
      const t = Math.min((performance.now() - start) / duration, 1);
      // Smooth bezier-like ease — gentle start, gentle stop
      const ease = t * t * (3 - 2 * t);
      window.scrollTo(0, from + (target - from) * ease);
      updateBlur();
      if (t < 1) settleAnim = requestAnimationFrame(animate);
      else settleAnim = null;
    }
    animate();
  }

  let isSettling = false;
  let scrollbarTimer = null;

  window.addEventListener('scroll', () => {
    updateBlur();

    // Show scrollbar
    const track = document.getElementById('scroll-track');
    track.classList.add('visible');
    clearTimeout(scrollbarTimer);
    scrollbarTimer = setTimeout(() => { track.classList.remove('visible'); }, 1500);

    // Ignore scroll events caused by the settle animation
    if (settleAnim) return;

    // User is scrolling — cancel any pending settle
    clearTimeout(settleTimer);
    settleTimer = setTimeout(settleToNearest, 120);
  });


  window.addEventListener('resize', updateBlur);

  // ─── Overlays ───

  async function openPost(id) {
    openEditor(id);
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
    currentPostId = null;
  }

  async function openEditor(postId) {
    editingPostId = postId || null;
    const textarea = document.getElementById('editor-content');

    // Pre-fill from cached excerpt so there's no blank flash
    if (editingPostId) {
      const cached = posts.find(p => p.id === editingPostId);
      if (cached) textarea.value = stripHtml(cached.excerpt || '');

      // Then fetch full content and update
      const post = await fetchPost(editingPostId);
      if (post) textarea.value = stripHtml(post.content);
    } else {
      textarea.value = '';
    }

    document.getElementById('editor').classList.add('open');
    document.body.style.overflow = 'hidden';
    textarea.focus();
  }

  function closeEditor() {
    document.getElementById('editor').classList.remove('open');
    if (!document.getElementById('overlay').classList.contains('open')) {
      document.body.style.overflow = '';
    }
  }

  function editCurrent() {
    closeOverlay();
    openEditor(currentPostId);
  }

  // ─── Init ───
  fetchPosts();
</script>
</body>
</html>
