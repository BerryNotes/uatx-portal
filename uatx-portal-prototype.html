  "event-aha": {
    title: "AHA Foundation \u2014 If Not Now Fellowship",
    backTo: "events",
    backLabel: "Back to Events & Travel",
    content: [
      {p:'<a href="https://www.theahafoundation.org/if-not-now-fellowship/" target="_blank" style="color:#a08839;font-size:13px;font-weight:500">\u2197 Visit AHA Foundation Website</a>'},
      {h2:"If Not Now Fellowship"},
      {p:"<strong>May 17\u201320, 2026 | New York City</strong>"},
      {p:"The If Not Now Fellowship is a week-long immersive experience for mid- to upper-level college student leaders that will equip them to stand up for their Jewish peers and confront antisemitism on their campuses."},
      {hr:true},
      {h2:"Details"},
      {p:'Participating students will be offered a <strong>$500 travel stipend</strong>, and hotel and meals are covered during the program.'},
      {p:"The curriculum combines lectures on antisemitism (its history, manifestations, how to recognize antisemitic bias on campuses), rights the students hold on campus to advocate for their Jewish peers, and excursions around NYC that tie into the programmatic themes of the fellowship."},
      {p:"By the end of the fellowship, participants will emerge with:"},
      {ul:[
        "A deeper understanding of how to identify and productively confront antisemitism",
        "Practical tools to stand up for their Jewish peers in their communities",
        "A supportive network of student leaders and nonprofit professionals",
        "The confidence to lead with integrity and purpose",
      ]},
      {p:"Accommodations will be arranged for Jewish students observing the holiday of Shavuot."},
      {hr:true},
      {h2:"Ideal Candidates"},
      {p:"AHA Foundation is accepting 15 students, and hope to include a mix of Christian, Jewish, and non-religious participants."},
      {p:"Admissions are rolling until the 15 student cohort is filled."},
      {p:"Students who are accepted will have shown leadership on their campus whether that be a part of a formal role in campus clubs or informal in the classroom."},
      {hr:true},
      {h2:"How to Apply"},
      {p:'Send an email to Nick Vainisi (<a href="mailto:nvainisi@uaustin.org" style="color:#a08839">nvainisi@uaustin.org</a>) with a CV and why you are interested in attending the program.'},
    ]
  },

  "event-austin-institute": {
    title: "Austin Institute \u2014 The Student Forum",
    backTo: "events",
    backLabel: "Back to Events & Travel",
    content: [
      {p:'<a href="https://www.austin-institute.org/" target="_blank" style="color:#a08839;font-size:13px;font-weight:500">\u2197 Visit Austin Institute Website</a>'},
      {h2:'The Student Forum \u2014 "Religion, Science & the State"'},
      {p:"For Alexis de Tocqueville, the study of politics always involved the study of \"mores,\" the moral and intellectual habits that define a people. In this seminar series, we will explore Tocqueville's study of American and democratic mores as they manifest in the domains of religion and science."},
      {hr:true},
      {h2:"About the Event"},
      {p:"The short seminars are led by an expert in the field and focus on exploring topics that help develop intellectual and moral virtues, particularly those that contribute to the flourishing of the individual and the establishment of healthy human relationships."},
      {hr:true},
      {h2:"Date/Time"},
      {ul:["Feb 04, 2026, 6:00 PM \u2013 7:30 PM","Feb 11, 2026, 6:00 PM \u2013 7:30 PM","Feb 18, 2026, 6:00 PM \u2013 7:30 PM"]},
    ]
  },

  "event-forge": {
    title: "Coign & Forge \u2014 Forge Leadership Summit",
    backTo: "events",
    backLabel: "Back to Events & Travel",
    content: [
      {p:'<a href="https://forgeleadership.org/" target="_blank" style="color:#a08839;font-size:13px;font-weight:500">\u2197 Visit Forge Leadership Institute</a>'},
      {h2:"Win an All-Expenses-Paid Trip to a 2026 Forge Leadership Summit"},
      {p:"Are you \u2014 or do you know \u2014 a young conservative looking to bolster your leadership skills and connect with other like-minded leaders?"},
      {p:"In partnership with Forge Leadership Institute, a previous Coign charity recipient, we are offering three all-expenses-paid spots to attend a 2026 Forge Leadership Summit in Nashville, TN (June 15\u201319) or Columbus, OH (July 20\u201324). Applicants must be 18\u201325 years old and submit a 90-second video sharing how Forge would prepare them to lead, serve, and make a lasting impact."},
      {hr:true},
      {h2:"Details"},
      {p:"Forge Leadership Institute is committed to fostering the minds, character, and conviction of the next generation of conservative leaders. Through immersive leadership summits, Forge equips young Americans with the principles, relationships and practical tools needed to lead with courage, responsibility and purpose."},
      {p:"Attendees will refine their skills through experiential learning exercises, including a media training workshop, legislative process simulations, relationship building activities and more."},
      {p:"This is more than a conference \u2014 it's an investment in those who aspire to help strengthen American culture, institutions and civic life."},
      {hr:true},
      {h2:"Locations and Dates"},
      {ul:["<strong>Nashville, TN:</strong> June 15\u201319, 2026","<strong>Columbus, OH:</strong> July 20\u201324, 2026"]},
      {h2:"Winners Will Receive"},
      {ul:["Summit Registration","Round-Trip Airfare","Lodging, Meals and On-Site Accommodations"]},
      {h2:"Eligibility"},
      {ul:["Age 18\u201325 at the time of the summit","Available to attend at least one of the listed dates","Demonstrated interest in leadership and service and a commitment to the values of Coign and the Forge Leadership Institute"]},
      {hr:true},
      {h2:"How to Apply"},
      {p:"Applicants must submit a video no longer than 90 seconds responding to one of the following prompts:"},
      {ul:[
        "What issue in America today most motivates you to lead \u2014 and how do you hope Forge Leadership will help prepare you to address it?",
        "How do you plan to use the leadership training and relationships from the Forge Leadership Summit to strengthen your community, industry or the country over the next 10 years?",
        "Forge invests in leaders who value responsibility, freedom and service. How do these principles shape your vision for making America stronger?",
        "Why are you personally committed to contributing to America's future \u2014 and why is now the right time for you to attend the Forge Leadership Summit?",
      ]},
      {p:'To apply, please email the video to <a href="mailto:marketing@coign.com" style="color:#a08839">marketing@coign.com</a> no later than <strong>March 6, 2026</strong>.'},
    ]
  },

  "event-pepperdine": {
    title: "Pepperdine School of Public Policy",
    backTo: "events",
    backLabel: "Back to Events & Travel",
    content: [
      {p:'<a href="https://publicpolicy.pepperdine.edu/" target="_blank" style="color:#a08839;font-size:13px;font-weight:500">\u2197 Visit Pepperdine School of Public Policy</a>'},

  "event-reagan": {
    title: "Ronald Reagan Institute",
    backTo: "events",
    backLabel: "Back to Events & Travel",
    content: [
      {p:'<a href="https://www.reaganfoundation.org/reagan-institute/" target="_blank" style="color:#a08839;font-size:13px;font-weight:500">\u2197 Visit Ronald Reagan Institute</a>'},
      {h2:"About the Ronald Reagan Institute"},
      {p:"The Ronald Reagan Institute serves to advance the principles and legacy of President Ronald Reagan in today's policy landscape. The Institute convenes bipartisan leaders, produces research on national security and economic prosperity, and develops the next generation of public servants through its fellowship and internship programs."},
      {hr:true},
      {h2:"Programs & Fellowships"},
      {h3:"Academy for Civic Education and Democracy (early June\u2013late July)"},
      {p:"In partnership with the George Washington University, ACED offers high-achieving college students the opportunity to spend a summer learning leadership skills and civic engagement while immersed in Washington DC life. Students participate in an internship with one of our DC-based partners and take a class about presidential leadership at RRI."},
      {h3:"Civic Leaders Fellowship (November\u2013April)"},
      {p:"Our CLF students participate in a six month leadership and professional development program designed to cultivate them into the next generation of civic-minded professionals. They meet six times \u2014 thrice virtually, twice in Washington, DC, and once at the Reagan Library in Simi Valley, CA. They'll be paired with a professional mentor in RRI's network."},
      {h3:"National Defense Fellowship (September\u2013December)"},
      {p:"Run in conjunction with the Alexander Hamilton Society, NDF seeks to educate about 20 advanced students in the vocabulary, theory, practice, and organization of U.S. defense policy. The main components include the Peace Through Strength Boot Camp in September and participation in the Reagan National Defense Forum in Simi Valley, CA."},
      {h3:"American Opportunity Bootcamp (October)"},
      {p:"AOB is a three day weekend convening in Washington DC that seeks to educate undergraduates about economic policymaking process and explore current ideas and debates in applied political economy \u2014 including the role of research, business, interest groups, lobbying, think tanks, and journalism in the policymaking process."},
    ]
  },

  "event-israel": {
    title: "Study Abroad in Israel",
    backTo: "events",
    backLabel: "Back to Events & Travel",
    content: [
      {p:'<a href="https://herutna.org/" target="_blank" style="color:#a08839;font-size:13px;font-weight:500">\u2197 Visit Herut North America</a>'},
      {h2:"Study Abroad in Israel"},
      {p:"<strong>June 21 \u2013 July 1, 2026 | Israel</strong>"},
      {p:"We are pleased to invite applications for an 11-day study abroad program in Israel. Supported by a generous grant from the Dell Foundation, this program offers an opportunity to explore the history, culture, and geopolitics of the region. The trip will entail a 1.5 credit hour course taught by Prof. JJ Kimche on Israel's past and future, and will require a 3\u20135 hour Zoom seminar in the week prior to the program."},
      {p:"The trip, organized by Herut, immerses students in the complexities of Israeli sovereignty, security doctrine, and history through strategic visits to Jerusalem, Judea & Samaria, and the Gaza Envelope. Participants will engage in high-level meetings with Knesset members and military strategists, alongside touring iconic historical sites such as the City of David and Masada."},
      {hr:true},
      {h2:"Key Details"},
      {ul:[
        "<strong>Dates:</strong> June 21 \u2013 July 1",
        "<strong>Subsidized Cost:</strong> $2,000 (includes round-trip airfare, lodging, and programming). Due by May 1, 2026.",
        "<strong>Eligibility:</strong> Open to students with an academic average of 83 or higher.",
      ]},
      {hr:true},
      {h2:"How to Apply"},
      {p:"Space is strictly limited. Participants will be selected based on academic standing and a statement of interest."},
      {p:"<strong>Deadline:</strong> Applications are due by Friday, January 30 at the start of the day (8:00 AM CST)."},
    ]
  },

  "event-txse": {
    title: "Texas Stock Exchange \u2014 Student Visit",
    backTo: "events",
    backLabel: "Back to Events & Travel",
    content: [
      {p:'<a href="https://www.txse.com/" target="_blank" style="color:#a08839;font-size:13px;font-weight:500">\u2197 Visit Texas Stock Exchange Website</a>'},
      {h2:"Visit the Texas Stock Exchange"},
      {p:"<strong>April 1, 2026</strong>"},
      {p:"We are excited to offer a unique opportunity for a select group of students to visit the Texas Stock Exchange in Dallas. Students selected for this experience will meet with the exchange's founders, tour the facilities, and join them for a private lunch in their offices. This visit is designed for students who are genuinely curious about markets, finance, and the changing landscape of American capital formation."},
      {p:"<strong>Important:</strong> Students will not be excused from class for attending this visit. If you have a class or academic commitment that conflicts with the timing of the trip, you must resolve it directly with your professor before accepting a spot."},
      {hr:true},
      {h2:"About the Texas Stock Exchange"},
      {p:"The Texas Stock Exchange (TXSE) is a newly established national securities exchange headquartered in Dallas. Founded with the goal of creating a more competitive, issuer-friendly alternative to legacy exchanges, TXSE seeks to streamline listing requirements, reduce regulatory friction, and attract companies and investors who value transparency, innovation, and choice."},
      {hr:true},
      {h2:"How to Apply"},
      {p:'<strong>Deadline: February 20, 2026</strong>'},
      {p:'Students interested in attending should submit short written responses by email to Nick Vainisi (<a href="mailto:nvainisi@uaustin.org" style="color:#a08839">nvainisi@uaustin.org</a>). Your email should include answers to the following:'},
      {ul:[
        "Why are you interested in visiting the Texas Stock Exchange?",
        "What do you hope to learn from the experience?",
        "What is one question you would ask a leader at the Texas Stock Exchange, and why?",
        "In your view, what role do stock exchanges play in a free and prosperous society?",
        "Are you currently following a specific market, index, asset class, or sector? If so, which one and why?",
      ]},
      {p:"Students will be chosen based on clarity of interest, thoughtfulness of responses, demonstrated curiosity about markets, and overall professionalism."},
    ]
  },

  // ─── OPPORTUNITY SUBPAGES ───
  "opp-casas": {
    title: "Casas por Cristo",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"About Casas por Cristo"},
      {p:"Casas por Cristo is a non-profit organization dedicated to building safe, decent homes for families in need throughout Latin America and the United States. Their mission is rooted in serving vulnerable communities by providing housing solutions that promote dignity, stability, and hope. Through volunteer teams, local partnerships, and compassionate service, Casas por Cristo works to strengthen communities and foster long-term relationships with the families they serve."},
      {hr:true},
      {h2:"Building Internship"},
      {p:"The Building Internship with Casas por Cristo offers a hands-on opportunity to participate directly in the construction of homes for families in need. Interns work alongside experienced staff, volunteers, and local partners to assist with building projects, manage tools and materials, and support on-site coordination efforts. This internship provides meaningful exposure to construction work, teamwork, and service-oriented leadership in a mission-driven environment."},
      {hr:true},
      {h2:"Administrative Internship"},
      {p:"The Administrative Internship provides practical experience supporting the day-to-day operations of a non-profit organization. Interns assist with office administration, communications, volunteer coordination, data management, and program support. This role is ideal for students interested in non-profit administration, communications, operations, or ministry support, and offers valuable insight into how mission-driven organizations function behind the scenes."},
      {hr:true},
      {h2:"Mission Trips & Volunteer Opportunities"},
      {p:"In addition to internships, Casas por Cristo offers mission trips and volunteer opportunities for individuals, churches, and student groups who want to serve families in need through hands-on homebuilding and relational ministry. Participants work directly with local communities, helping construct homes while building meaningful relationships with homeowners and fellow volunteers."},
      {p:"Mission trips range from short-term experiences to longer commitments and provide an opportunity to grow personally, professionally, and spiritually while making a tangible impact. No prior construction experience is required. Training and guidance is provided on site."},
    ]
  },

  "opp-cicero-fellowship": {
    title: "Cicero Institute \u2014 Summer Research Fellowship",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"What is the Cicero Institute?"},
      {p:"The Cicero Institute is a nonpartisan group of policy innovators with deep experience in government, legislating, research, technology, and entrepreneurship. Together, we incubate, develop, and fight for policies that apply the principles of a free society and solve problems at the state level, impacting millions of Americans."},
      {hr:true},
      {h2:"Overview"},
      {p:"The Cicero Institute seeks ambitious, talented part-time Summer Research Assistants to experience practical policy development for a summer in Austin, Texas. Summer RAs will identify a system-level social and/or public problem related to Cicero's issue areas and develop a policy response. They will achieve this while immersed in our entrepreneurial culture in tandem with other projects that advance Cicero's goals. RAs will gain professional development under the mentorship of our experienced policy team. All are encouraged to apply: philosophers and data scientists, writers and engineers, welders and policy students."},
      {hr:true},
      {h2:"Requirements"},
      {ul:[
        "A high school graduate, not currently enrolled in a graduate program, and not the recipient of a graduate degree",
        "Willing to relocate to Austin for the duration of the summer program",
        "Ideologically aligned with the mission of the Cicero Institute",
        "Detail-oriented",
        "Intellectually curious",
        "Skilled at grappling with and conveying complex concepts and processes",
        "Self-driven and entrepreneurial",
        "Organized and able to manage multiple tasks",
        "Genuinely enthusiastic to learn about and apply their skills to public policy",
      ]},
      {hr:true},
      {h2:"Responsibilities"},
      {ul:[
        "Work approximately 6 hours per day, Monday through Thursday, in our Austin office",
        "Support the Cicero Institute's policy development through research, drafting, editing, and more at the direction of Cicero staff",
        "Collaborate with the Cicero Institute's staff to identify a system-level social and/or public sector problem and develop a policy response",
        "Present the identified problem and policy response for feedback with Cicero's policy area lead",
        "Attend weekly check-ins with the program directors to receive support and discuss progress",
        "Share and present work, collaborate on projects, and gain familiarity with research across all policy verticals",
        "Write posts for Cicero staff to share upon completion of major assignments",
      ]},
      {hr:true},
      {h2:"Professional Development"},
      {ul:[
        "Professional development events with Cicero staff and guest speakers",
        "Publication of an opinion piece on the Cicero Institute's website or in an external publication",
        "Individual writing workshopping with the communications and media staff",
        "Causal inference literacy and data workshop",
        "Alerts of events with other Austin-based policy organizations over the summer",
        "One-on-one career advising from a Cicero staff mentor",
        "An exit interview with personalized professional development advice",
      ]},
      {hr:true},
      {h2:"Details"},
      {ul:[
        "<strong>Program Dates:</strong> June 15, 2026 through August 14, 2026",
        "<strong>Compensation:</strong> $650 per week",
        "<strong>Location:</strong> Austin, TX",
      ]},
      {hr:true},
      {h2:"How to Apply"},
      {p:'Let Erin Valdez (<a href="mailto:evaldez@uaustin.org" style="color:#a08839">evaldez@uaustin.org</a>) know if you plan to apply. Applications will be considered on a rolling basis through <strong>March 15, 2026</strong>. For any questions, please reach the team at <a href="mailto:internships@ciceroinstitute.org" style="color:#a08839">internships@ciceroinstitute.org</a>.'},
    ]
  },

  "opp-cicero-ra": {
    title: "Cicero Institute \u2014 Research Assistant",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"Overview"},
      {p:"The Cicero Institute is hiring a Research Assistant to support the development of state-focused policy reforms. Working closely with senior staff, you will deliver rigorous research and polished written products\u2014independently and as part of teams\u2014to execute ambitious, high-quality products on tight timelines."},
      {p:"We operate in a disciplined, high-expectation environment. We often move quickly from research to implementation and work alongside a strong network of public- and private-sector leaders to advance reforms that most policy organizations cannot execute."},
      {p:"The Research Assistant (RA) role is an entry-level position, but it is also a front-line opportunity for a smart, hardworking, self-driven individual who shares our values and wants to improve government for the prosperity of all."},
      {hr:true},
      {h2:"The Work Includes"},
      {ul:[
        "50-state legislative landscapes with clean citations and clear categorizations",
        "Short policy memos that frame problems and recommend options",
        "Draft statutory or regulatory language accompanied by plain-English summaries",
        "One-page briefs that distill what happened, why it matters, and what we should do next",
      ]},
      {p:"RAs may also help develop simple tables, exhibits, and analytics that turn messy or incomplete information into clear, actionable recommendations for policymakers."},
      {hr:true},
      {h2:"Key Responsibilities"},
      {ul:[
        "Produce well-sourced, timely research to support state-focused policy proposals and advocacy material",
        "Draft and revise memos, briefs, position pieces, blogs, and longer research products to a public-ready standard",
        "Navigate fragmented information and translate it into decision-grade outputs",
        "Track and synthesize relevant policy developments into internal and/or external policy briefs",
        "Support cross-team requests with clear scoping, tight timelines, and clean deliverables",
        "Conduct 50-state legislative mappings by locating, verifying, and summarizing relevant statutes, bills, and administrative rules",
        "Support policy language development by drafting and editing legislation or regulatory language",
      ]},
      {hr:true},
      {h2:"The Ideal Candidate"},
      {ul:[
        "Is self-directed and takes full ownership of their work",
        "Has comfort turning loosely defined assignments into well-scoped projects on deadline",
        "Is a strong writer and critical thinker",
        "Exercises sound judgment, rigorously verifying facts",
        "Maintains high standards for organization and follow-through",
        "Is coachable and growth-oriented",
        "Brings genuine intellectual curiosity and the ability to quickly learn new policy domains",
        "Experience with quantitative analysis or coding (Excel, R, Python, Stata) is a plus",
      ]},
      {hr:true},
      {h2:"How to Apply"},
      {p:'The Cicero Institute offers a competitive salary and benefits package including health benefits, 401k, and a generous paid leave plan. The ideal candidate is located in Austin, Texas, or is willing to relocate.'},
      {p:'To apply, please email <a href="mailto:careers@ciceroinstitute.org" style="color:#a08839">careers@ciceroinstitute.org</a> with: (1) your resume, (2) a one-page memo responding to one of the prompts below, and (3) three professional references.'},
      {h3:"Prompt 1 (Structural Problem Memo)"},
      {p:"Write a one-page, single-spaced memo to a state legislator explaining a policy problem you care about. Explain why the problem is structural, why current state action is insufficient, and what happens if the state does nothing. Be clear, urgent, and jargon-free."},
      {h3:"Prompt 2 (Policy Options Memo)"},
      {p:"Write a one-page, single-spaced memo to a state policymaker on a concrete reform idea. State the goal in one sentence and define how success would be measured. Present three policy options, each with benefits, risks, and implementation constraints. Recommend one option and anticipate the strongest objection with a response."},
    ]
  },

  "opp-first-court": {
    title: "First Court of Appeals \u2014 Summer Internship",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"Judicial Internships"},
      {p:"<strong>First Session:</strong> June 2 \u2013 June 27, 2026"},
      {p:"<strong>Second Session:</strong> July 7 \u2013 August 1, 2026"},
      {p:"The First Court of Appeals is accepting applications from law students who will be rising second- and third-year students during Summer 2026 for unpaid judicial internship positions. The positions may be volunteer or for credit. Your school or an outside organization may financially support judicial internships."},
      {hr:true},
      {h2:"About the Program"},
      {p:"The First Court's intern program provides an opportunity to improve research and writing skills, while also providing a behind-the-scenes view of how an intermediate court of appeals works. Interns research factual and legal issues, review appellate records, perform substantive citation checks, write memoranda of law, discuss those memoranda with the judges and the Court's attorneys, observe the judges' discussion of issues in cases that are submitted, observe oral argument, and observe post-submission resolution of legal issues raised in oral argument."},
      {hr:true},
      {h2:"How to Apply"},
      {p:'Please submit (1) a cover letter, (2) a resume, and (3) an unofficial transcript. Please combine all three documents into one PDF file and email to <a href="mailto:interns@txcourts.gov" style="color:#a08839">interns@txcourts.gov</a>.'},
      {p:"Please note that incomplete or inaccurate applications will not be accepted."},
      {p:'If you have any questions, you can email them to <a href="mailto:interns@txcourts.gov" style="color:#a08839">interns@txcourts.gov</a>.'},
    ]
  },

  "opp-futures-forge": {
    title: "Futures Forge \u2014 Facilitator",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"Facilitator Internship"},
      {p:"Futures Forge is hiring college sophomores through seniors to join their Skills for Success Accelerator as Facilitators this summer in Boston."},
      {p:"Being a facilitator at Futures Forge is an elite opportunity reserved for the best. As a facilitator, you'll guide and inspire others while honing your leadership and problem-solving skills. This is a challenging role that demands excellence, creativity, emotional intelligence, horsepower, motivation, and drive."},
      {p:"Facilitators are the backbone of Futures Forge's innovative challenge-driven learning system. Facilitators adapt and run challenges for students, and coach the students in intense team and 1:1 coaching sessions to help them learn and grow from the challenges they took on."},
      {p:"You'll live on-site with high school students, coach them through hands-on challenges, and build real-world skills like critical thinking and leadership."},
      {hr:true},
      {h2:"Details"},
      {ul:[
        "<strong>Duration:</strong> 9 weeks paid, June 15 \u2013 August 14",
        "<strong>Location:</strong> Boston, MA",
        "<strong>Room &amp; board covered</strong>",
      ]},
      {hr:true},
      {h2:"You Will"},
      {ul:[
        "<strong>Gain Real World Experience:</strong> At Futures Forge, the responsibility is real, the results matter. Your performance directly impacts the success and growth of your students.",
        "<strong>Build Your Future:</strong> Develop valuable skills, enhance your resume, and earn while you learn.",
        "<strong>Get Best-in-Class Coaching:</strong> Futures Forge develops its talent with the same methods and people that have been developing elite management consultants for decades.",
        "<strong>Inspire Others:</strong> Empower and mentor others, helping them grow and gain confidence while making a lasting impact.",
        "<strong>Form Deep Bonds:</strong> The facilitation experience is intense, and the bonding that occurs in experiences both exciting and challenging is unmatched.",
      ]},
    ]
  },

  "opp-hertog": {
    title: "Hertog Foundation \u2014 Summer Fellowship",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"Why Hertog?"},
      {p:"For over 15 years, the Hertog Foundation has offered nationally competitive educational programs for aspiring leaders passionate about shaping the intellectual, civic, and political life of the United States. You are encouraged to apply for a transformational summer experience."},
      {hr:true},
      {h2:"Selective & Prestigious"},
      {ul:[
        "817 applicants from 286 colleges and universities",
        "97 fellows selected for Summer 2025",
        "Average accepted GPA: 3.81",
      ]},
      {h2:"Exceptional Fellows"},
      {ul:[
        "Graduate at 19 (summa cum laude)",
        "Solo vocalist at Carnegie Hall",
        "Dual Truman-Marshall Scholar",
        "USA Biology Olympiad top 50 medalist",
        "U.S. military veterans and NCAA athletes",
        "Published in major outlets: NYT, Bloomberg, CNN, WSJ",
      ]},
      {hr:true},
      {h2:"Summer 2026 Program Offerings"},
      {h3:"Political Studies Program (6 weeks)"},
      {p:"Revamped curriculum + special speakers celebrating the 250th anniversary of the Declaration of Independence."},
      {h3:"Security Studies Program (5 weeks)"},
      {p:"Expanded program focused on today's key national security challenges."},
      {h3:"Constitutional Studies Program (2 weeks)"},
      {p:"Explore major constitutional debates with leading legal scholars and Supreme Court advocates."},
      {h3:"War Studies Program (2 weeks)"},
      {p:"Study the theory, practice, and organization of war with top U.S. military commanders and civilian leaders."},
      {h3:"Virtual Humanities at Hertog Seminars"},
      {p:"Engage with classic texts in philosophy, history, and literature\u2014no travel required."},
      {hr:true},
      {h2:"How to Apply"},
      {p:'Students may apply directly at <a href="https://hertogfoundation.org" target="_blank" style="color:#a08839">hertogfoundation.org</a> or be nominated by faculty and advisors.'},
    ]
  },

  "opp-hudson": {
    title: "Hudson Institute \u2014 Political Studies Summer Fellowship",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"Summer Fellowship"},
      {p:"Hudson Institute Political Studies Summer Fellowship offers a six-week education in political theory and practice that broadens and deepens understanding of public policy and American political principles. Rather than a set of answers, Hudson Institute Political Studies provides a framework for political thought and strategic analysis that equips students to seriously confront the challenges facing this nation and the world."},
      {hr:true},
      {h2:"Participate In"},
      {ul:[
        "<strong>Rigorous seminars</strong> led by master teachers on week-long topics in political theory and public policy",
        "<strong>Policy workshops</strong> led by think tank experts and experienced government officials, from foreign policy in the Middle East to AI Policy and Regulation",
        "<strong>Distinguished speaker series</strong> of national leaders from the government, business, journalism, the military, and the academy. Recent speakers include Senator Tom Cotton and General Jack Keane.",
      ]},
      {hr:true},
      {h2:"Curriculum"},
      {ul:[
        "<strong>Week 1:</strong> Political Foundings \u2014 The Classical Origins of Modern Politics",
        "<strong>Week 2:</strong> The American Founding \u2014 Understanding the American Experiment",
        "<strong>Week 3:</strong> The Ideal Republic \u2014 Citizenship according to Plato's Republic",
        "<strong>Week 4:</strong> The American Refounding \u2014 On Lincoln & the Fight for a Free America",
        "<strong>Week 5:</strong> Public Policy \u2014 Current Topics in Domestic & Foreign Policy",
        "<strong>Week 6:</strong> Beyond Politics \u2014 Religion, Technology, & Public Life",
      ]},
      {hr:true},
      {h2:"Perks"},
      {ul:[
        "<strong>Free to Attend:</strong> Admitted students attend free of charge and receive a library of all the texts read during the program",
        "<strong>Stipend:</strong> Participants receive a $3,000 stipend to offset travel and other costs",
        "<strong>Complimentary Housing:</strong> Summer fellows live together in the heart of DC in apartment style housing with full kitchens",
        "<strong>At the Heart of American Politics:</strong> Summer Fellows experience political life in Washington, DC",
      ]},
      {hr:true},
      {h2:"Sessions"},
      {ul:[
        "<strong>Session I:</strong> May 24 \u2013 July 5",
        "<strong>Session II:</strong> June 28 \u2013 August 7",
      ]},
      {h2:"How to Apply"},
      {p:'To apply for a 2026 session, please visit <a href="https://www.hudsonpoliticalstudies.org" target="_blank" style="color:#a08839">www.hudsonpoliticalstudies.org</a>.'},
      {p:'If you have questions, contact Ayla McBreen at <a href="mailto:amcbreen@hudson.org" style="color:#a08839">amcbreen@hudson.org</a>.'},
    ]
  },

  "opp-maynard-nexsen": {
    title: "Maynard Nexsen \u2014 Legal Internship Program",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"About Maynard Nexsen"},
      {p:"Maynard Nexsen is a national, full-service law firm with nearly 600 attorneys across 31 U.S. locations, serving clients ranging from public companies to high-growth startups. The firm formed in 2023 through the merger of Maynard Cooper & Gale and Nexsen Pruet, creating one integrated platform with coast-to-coast reach."},
      {ul:[
        "Ranked 99th on Forbes' 2025 list of America's Best Companies\u2014the only law firm to make the list",
        "Consistently honored by Chambers USA and Best Law Firms, including National Tier 1 distinctions",
        "Listed in the NLJ 500 and Am Law 200",
      ]},
      {hr:true},
      {h2:"Program Overview"},
      {ul:[
        "<strong>Duration:</strong> 12 months, aligned to the academic calendar and respectful of school holidays",
        "<strong>Schedule:</strong> Priority given to interns available every weekday for consistent limited hours (2\u20134 hours)",
        "<strong>Location:</strong> Austin, TX",
      ]},
      {hr:true},
      {h2:"What You'll Do"},
      {p:"Interns are treated as professionals and expected to perform. You'll receive real responsibility on consequential work, with close mentorship from litigators and corporate deal teams."},
      {h3:"Primary Tracks"},
      {ul:[
        "<strong>High-Stakes Litigation:</strong> Join complex commercial matters\u2014drafting research memos, assisting with discovery, building factual records, and shadowing hearings or depositions",
        "<strong>Corporate & Transactions:</strong> Contribute to venture capital, M&A, fund formation, and corporate governance",
      ]},
      {h3:"Elective Exposure"},
      {ul:[
        "Real Estate: Support financings, acquisitions, and development matters",
        "Government & Regulatory Affairs: Assist with research and client advisories",
        "Department of War Contracting: Explore specialized government contracting work",
        "Broader Capabilities: IP/tech, employment & labor, cross-border trade, and more",
      ]},
      {hr:true},
      {h2:"Why This Program Stands Out"},
      {ul:[
        "<strong>Meaningful Work, Measurable Impact:</strong> Interns contribute to live litigation and active deals",
        "<strong>Top-tier mentorship:</strong> Work alongside Chambers- and Best-Lawyers-recognized attorneys",
        "<strong>Austin + National Platform:</strong> Gain local market fluency while leveraging national resources",
      ]},
      {hr:true},
      {h2:"Candidate Profile"},
      {ul:[
        "Intellectual rigor and clear written communication",
        "Accountability and professionalism under time pressure",
        "Curiosity across disciplines, with interest in litigation and corporate work",
        "Reliability to maintain a consistent weekday schedule during the term",
      ]},
      {hr:true},
      {h2:"Application Details"},
      {ul:[
        "<strong>Deadline:</strong> February 27 (for the upcoming 12-month cohort)",
        "<strong>Materials:</strong> Resume, a brief statement of interest (250\u2013400 words), and a written work sample (legal or analytical)",
        "<strong>Selection:</strong> Rolling interviews; offers extend promptly",
      ]},
      {p:'Submit applications to Nick Vainisi (<a href="mailto:nvainisi@uaustin.org" style="color:#a08839">nvainisi@uaustin.org</a>) and indicate &quot;Maynard Nexsen Austin Internship&quot; in the subject line.'},
    ]
  },

  "opp-naia": {
    title: "New American Industrial Alliance \u2014 Content Manager",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"About NAIA"},
      {p:"The New American Industrial Alliance (NAIA) is a 501(c)(6) trade organization dedicated to revitalizing American industry. Spun out of the Reindustrialize Summit\u2014which gained national attention in just its second year\u2014NAIA advocates for U.S. manufacturing, energy, rare earths, and physical technology companies that are building the backbone of a new industrial economy. Members include leading venture capital firms such as General Catalyst, 8VC, a16z, and Eclipse, as well as companies like Joby, Hadrian, Oklo, and Palantir."},
      {hr:true},
      {h2:"The Role: Content Manager"},
      {p:"NAIA is seeking a strong writer and digital strategist to lead content creation and audience growth across NAIA's channels. This role offers the chance to help shape the narrative of America's industrial resurgence while collaborating with executives, founders, and investors driving national reindustrialization."},
      {h3:"Key Responsibilities"},
      {ul:[
        "Manage and grow NAIA's social media presence (X, LinkedIn, Instagram)",
        "Write and edit a biweekly newsletter for a growing audience",
        "Create engaging content that builds community and drives engagement",
        "Work with leadership to amplify messaging around key initiatives and events",
      ]},
      {h3:"Qualifications"},
      {ul:[
        "Demonstrated ability to build or manage high-performing social media accounts (include links)",
        "Excellent writing and editing skills",
        "Strong interest in American industry, manufacturing, and economic resilience",
        "Entrepreneurial mindset with high initiative and adaptability",
        "Preferred: experience with UATX-style environments emphasizing high agency",
      ]},
      {hr:true},
      {h2:"Why Join"},
      {ul:[
        "Contribute to a national movement to restore American industrial strength",
        "Collaborate with leading entrepreneurs, investors, and policymakers",
        "Help define the voice of a fast-growing organization with national impact",
      ]},
      {hr:true},
      {h2:"How to Apply"},
      {p:'Send a resume, a short note about your interest, and links to social media accounts you\'ve built or managed to <a href="mailto:ben@newindustrials.org" style="color:#a08839">ben@newindustrials.org</a>.'},
    ]
  },

  "opp-texas-governor": {
    title: "Office of the Texas Governor \u2014 Internship Program",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"Governor's Internship Program"},
      {p:"Do you see a future career in public service? The Texas Governor's Internship program could be the next stepping stone for your career in public service. The Office of the Governor (OOG) Internship program offers college students and recent graduates valuable experience and exposure to state government by providing opportunities to work alongside OOG staff in a variety of different fields."},
      {hr:true},
      {h2:"Benefits"},
      {ul:[
        "Give students an overview of state government by working closely with staff in the Office of the Governor",
        "Provide students with experience in a working office environment",
        "Enhance appreciation of public service",
        "Interns are assigned to work with the Governor's staff",
      ]},
      {h2:"Primary Duties"},
      {ul:[
        "Performs support work for division program areas",
        "Provides project assistance",
        "Conducts research as requested for various projects",
        "Prepares correspondence, reports, studies, forms and documents",
        "May research, compose, design, or edit agency publications",
        "Assists with special projects",
      ]},
      {hr:true},
      {h2:"Sessions"},
      {ul:[
        "<strong>Spring:</strong> January \u2013 May (applications due November 15)",
        "<strong>Summer:</strong> June \u2013 August (applications due April 15)",
        "<strong>Fall:</strong> September \u2013 December (applications due July 15)",
      ]},
      {p:"Internships are on an unpaid basis. They are available to college students and recent graduates."},
      {hr:true},
      {h2:"Available Divisions"},

        "Constituent Communications","Criminal Justice Division","Economic Development","Financial Services",
        "General Counsel","Homeland Security Grants Division","Human Resources","Legislative Office",
        "Office of Compliance and Monitoring","Office of the First Lady","Office of State & Federal Relations (Washington D.C.)",
        "Office of Economic Development Finance","Public Safety Office","Research and Economic Analysis",
        "Scheduling & Advance","Texas Film Commission","Texas Music Office",
        "Texas Military Preparedness Commission","Travel Texas","Texas Space Commission",
      ]},
      {hr:true},
      {h2:"How to Apply"},
      {p:'Students interested should submit the application, a cover letter, and a resume to Nick Vainisi (<a href="mailto:nvainisi@uaustin.org" style="color:#a08839">nvainisi@uaustin.org</a>) to be considered for the program.'},
    ]
  },

  "opp-open-the-books": {
    title: "Open the Books",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"About Open the Books"},
      {p:"Open the Books, the nation's flagship transparency organization, believes deeply in citizen journalism and citizen activism. Our tagline is our mission: <em>Every dime. Online. In real-time.</em> A free society can't have accountability without visibility."},
      {p:"We focus on data capture, investigations, and changing transparency laws at all levels of government. We have created three pathways for individuals to engage directly in exposing how government spends YOUR money."},
      {hr:true},
      {h2:"Paid Contributors"},
      {p:"We invite independent researchers, journalists, and analysts to contribute original, non-partisan investigative work using Open the Books data."},
      {ul:[
        "$300 for short investigative pieces (600\u2013800 words)",
        "$1,000 for long-form investigations (1,200+ words)",
        "Submissions must be investigative in nature and grounded in data\u2014not political commentary",
        "Contributors receive access to the Open the Books team for customized data searches",
        "Articles are published under the Open the Books byline",
      ]},
      {p:'To learn more or pitch an investigation, contact: <a href="mailto:contributors@openthebooks.com" style="color:#a08839">contributors@openthebooks.com</a>'},
      {hr:true},
      {h2:"Open the Books Fellowships"},
      {p:"Consistent contributors may apply to join the Open the Books Fellows program\u2014a formal network of trusted investigators and transparency advocates."},
      {ul:[
        "Recognition on the Open the Books website",
        "Invitations to exclusive briefings, trainings, and internal events",
        "Opportunities to engage directly with leadership and research teams",
      ]},
      {p:'Program will be formally launched in Fall 2026. Contact: <a href="mailto:fellows@openthebooks.com" style="color:#a08839">fellows@openthebooks.com</a>'},
      {hr:true},
      {h2:"The Adam Andrzejewski Memorial Scholarship"},
      {p:"The Adam Andrzejewski Memorial Scholarship honors the legacy of Open the Books' late founder and CEO by supporting the next generation of transparency leaders."},
      {p:"Each year, Open the Books awards a <strong>$25,000 scholarship</strong> to one high school junior or senior, or current college student, who demonstrates leadership in advancing financial transparency, accountability, and public service."},
      {p:'Applications are due June 30, 2026. Contact: <a href="mailto:scholarship@openthebooks.com" style="color:#a08839">scholarship@openthebooks.com</a>'},
    ]
  },

  "opp-republican-jobs": {
    title: "RepublicanJobs.com \u2014 Job Placement",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"About RepublicanJobs.com"},
      {p:"RepublicanJobs.com is a political recruitment and placement platform that connects candidates with job and internship opportunities across the Republican political ecosystem. It operates as a private recruiting service, not an official arm of the Republican National Committee, and works with a wide network of employers, including political campaigns, government offices, policy organizations, consulting firms, and advocacy groups."},
      {p:"Individuals can submit their resumes for free, and the Republican Jobs team reviews applications and refers qualified candidates to organizations with current openings. The platform is commonly used by students, recent graduates, and early-career professionals seeking entry-level roles, internships, or career pathways in Republican politics, policy, communications, and public affairs."},
      {hr:true},
      {h2:"UATX Accelerated Track"},
      {p:"The founder of RepublicanJobs.com has provided UATX students with a special, dedicated application link that places them on an accelerated track within the recruiting process. Students who apply through this link receive:"},
      {ul:[
        "Prioritized review",
        "Early career consultation",
        "Faster matching for relevant jobs and internships",
      ]},
      {p:"This helps students move more quickly from resume submission to real opportunities in campaigns, policy organizations, and political firms."},
    ]
  },

  "opp-senator-cruz": {
    title: "Senator Ted Cruz \u2014 Summer Internship",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"Internship Program"},
      {p:"Sen. Cruz's Internship Program offers Texas students a unique opportunity to experience first-hand the inner workings of Congress."},
      {p:"There are two six-week sessions during the summer as well as full-semester internships in both the spring and fall. Interns work during normal office hours: Monday through Friday, from 8 am to 5 pm in Texas, from 9 am to 6 pm in Washington, D.C. The internship is in-person only."},
      {hr:true},
      {h2:"Available Offices"},
      {ul:["Washington, D.C.","Austin","Dallas","Houston","San Antonio","McAllen"]},
      {h2:"Due Dates"},
      {ul:[
        "<strong>Summer internships:</strong> completed packets are due the first Friday in March",
        "<strong>Fall semester:</strong> due the first Friday in July",
        "<strong>Spring semester:</strong> due the first Friday in November",
      ]},
      {p:"Priority is given to students either from Texas or students enrolled in a Texas school who have completed at least their sophomore year of college. This is a highly competitive process."},
      {p:"Internships in Washington, DC are paid and it is possible to receive internship course credit."},
      {hr:true},
      {h2:"What Interns Do"},
      {p:"Interns are supervised by the Director of the office location they select. They will receive weekly feedback and coaching on education, internship, and job pursuits. They will also participate in a reading program and discussion with a focus on American history, the role of government, and citizen engagement."},
      {h3:"Duties and Responsibilities"},
      {ul:[
        "Answering phones, reviewing voicemails, and logging constituent correspondence",
        "Assisting constituents with connecting to staffers",
        "Processing email, mail, and packages received",
        "Reviewing news items and compiling for office use",
        "Legislative research and follow-up for staff and constituents",
        "Assisting casework team with processing constituent requests",
        "Supporting the Service Academy Coordinator",
        "Various special projects as needed",
      ]},
      {hr:true},
      {h2:"How to Apply"},
      {p:'Submit the application online and the following items to Nick Vainisi (<a href="mailto:nvainisi@uaustin.org" style="color:#a08839">nvainisi@uaustin.org</a>) via email:'},
      {ul:[
        "A cover letter detailing why you would like to be an intern in Senator Ted Cruz's office",
        "A one page resume",
      ]},
    ]
  },

  "opp-finegold": {
    title: "Senator Barry Finegold \u2014 Summer Internship",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"Internship"},
      {p:"<strong>Summer 2026 | Boston</strong>"},
      {p:"The Office of Senator Barry Finegold is seeking motivated and civic-minded college students to join our team as interns for Summer 2026. This is an excellent opportunity to gain firsthand experience in state government, public policy, and constituent services while working inside the historic Massachusetts State House."},
      {p:"While the Massachusetts Senate does not offer paid internships, many interns hold outside jobs and we are happy to accommodate work schedules when possible. Please note that our office cannot assist with securing paid employment or housing."},
      {p:"Space within the State House is limited, and therefore so is our capacity. However, every Senate office hosts interns, and the Senate as a whole provides a robust educational program, including a speaker series featuring legislators and other public leaders."},
      {p:"Interns will work out of the Massachusetts State House in Boston, typically Monday\u2013Thursday (or another agreed-upon schedule). A returning intern from last year will serve as the \"Senior Intern,\" helping to coordinate schedules, support workflow, and act as a peer leader."},
      {hr:true},
      {h2:"Ideal Candidates"},
      {ul:[
        "A strong interest in public policy and state government",
        "An independent, proactive work ethic",
        "The ability to contribute meaningfully to research, policy projects, and constituent services",
        "Openness to the fast-paced, deadline-driven environment typical of a legislative office",
      ]},
      {hr:true},
      {h2:"How to Apply"},
      {p:'Send an email to Betsy Wall (<a href="mailto:elizabeth.wall@masenate.gov" style="color:#a08839">elizabeth.wall@masenate.gov</a>) with a resume and note explaining why you are interested in attending the program.'},
    ]
  },

  "opp-setna-io": {

    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"Internship Opportunities at Setna iO"},
      {p:"Setna iO offers internship opportunities designed to give students meaningful, hands-on experience within the aerospace supply chain industry. The company provides placements across several departments, depending on each student's interests, background, and academic focus."},

      {h2:"Summer 2026 Internships"},
      {p:"Setna iO is currently welcoming inquiries for Summer 2026 internships. While the standard internship period runs from May\u2013August, the company remains flexible to accommodate varying academic calendars."},

      {h2:"Potential Roles"},

        "HQ IL \u2014 Parts Trading",
        "HQ IL \u2014 Accounting",
        "HQ IL \u2014 Technology/Ops",
        "Setnix AZ \u2014 Engineering/Shop",
        "LGT Miami \u2014 Engineering/Shop",
        "Zulu Miami \u2014 Engineering/Shop",
        "Setnix UK \u2014 Engineering/Shop",
        "Setna UK \u2014 Parts Trading",
      ]},
      {hr:true},
      {h2:"Contact Information"},
      {p:'Students interested in learning more or expressing interest in a Summer 2026 internship are encouraged to reach out to:'},
      {ul:[
        'Mithila Wakode \u2014 <a href="mailto:Mithila.Wakode@setnaio.com" style="color:#a08839">Mithila.Wakode@setnaio.com</a>',
        'Janelle Weber \u2014 <a href="mailto:Janelle.Weber@setnaio.com" style="color:#a08839">Janelle.Weber@setnaio.com</a>',
      ]},
    ]
  },

  "opp-american-housing": {
    title: "The American Housing Corporation \u2014 Summer 2026 Internship",
    backTo: "opportunities",
    backLabel: "Back to Opportunities",
    content: [
      {h2:"About The American Housing Corporation"},
      {p:"The American Housing Corporation is on a mission to solve America's housing crisis through all-out production. They believe that America's affordability crisis is fundamentally a production crisis, and that solving it requires a vertically integrated development approach: They buy land, and manufacture, install, and sell their homes directly to customers. This is the only way to build at the scale necessary to solve the crisis."},
      {hr:true},
      {h2:"Internship Program"},
      {p:"The internship program offers opportunities for students and recent graduates to gain valuable real-world experience across a variety of fields, including Engineering, Design, Marketing, Architecture, and Supply Chain. Interns work on real projects that contribute directly to solving the housing crisis in the United States."},
      {h3:"Areas of Interest"},
      {ul:[
        "Engineering (Mechanical, Manufacturing, Robotics, or related disciplines)",
        "Architecture",
        "Design (Product, Interior, Graphic)",
        "Marketing & Communications",
        "Supply Chain & Operations",
      ]},
      {hr:true},
      {h2:"What You'll Do"},
      {ul:[
        "Collaborate with cross-disciplinary teams to support ongoing projects",
        "Conduct research, analyze data, and contribute new ideas",
        "Assist in process improvement initiatives and problem-solving",
        "Help develop presentations and documents for internal and external stakeholders",
        "Participate in team meetings, brainstorming sessions, and project reviews",
      ]},
      {hr:true},
      {h2:"Required Qualifications"},
      {ul:[
        "Currently enrolled in or recently graduated from a relevant undergraduate or graduate program",
        "Demonstrated interest in one of their focus areas",
        "Strong analytical, communication, and teamwork skills",
        "Ability to work in a fast-paced, dynamic environment",
        "Self-motivated, proactive, and eager to learn",
      ]},
      {p:"Compensation for internships is dependent on the role and experience of the candidate."},
    ]
  },
  "submit-activity": {
    title: "List a Club or Activity",
    backTo: "community",
    backLabel: "Back to Community",
    render: () => {
      const inputStyle = {width:"100%",padding:"10px 12px",border:"1px solid "+C.border,fontSize:13,boxSizing:"border-box",fontFamily:"'Libre Franklin', sans-serif",backgroundColor:C.white};
      const labelStyle = {fontSize:11,fontWeight:600,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.5px",display:"block",marginBottom:6};
      const [form, setForm] = React.useState({title:"",category:"Academic",desc:"",presidentEmail:""});
      const [submitted, setSubmitted] = React.useState(false);
      const allFilled = form.title && form.category && form.desc && form.presidentEmail;
      const handleSubmit = async () => {
        if (!allFilled) return;
        try {
          await fetch("/api/activities", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ activity: { title:form.title, category:form.category, meet_day:"", description:form.desc, president_email:form.presidentEmail, members:0 }})
          });
        } catch(e) {}
        setSubmitted(true);
      };
      if (submitted) return React.createElement("div", {style:{textAlign:"center",padding:"48px 0"}},
        React.createElement("div", {style:{width:56,height:56,borderRadius:"50%",backgroundColor:"#f0f4f0",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}},
          React.createElement("div", {style:{width:24,height:12,borderLeft:"3px solid #4a7c59",borderBottom:"3px solid #4a7c59",transform:"rotate(-45deg)",marginTop:-4}})
        ),
        React.createElement("h2", {style:{fontFamily:"Georgia, serif",fontSize:22,color:C.navy,margin:"0 0 12px"}}, "Submitted for Review"),

      );

const TopNav = ({activeTab, subPage, navigate, onSignOut, currentUser}) => {
  const [homeOpen, setHomeOpen] = useState(false);
  const [eventsOpen, setEventsOpen] = useState(false);
  const [profileOpen, setProfileOpen] = useState(false);
  const dropdownRef = useRef(null);

  useEffect(() => {
    const handleClickOutside = (e) => {
      if (dropdownRef.current && !dropdownRef.current.contains(e.target)) {
        setHomeOpen(false);
        setEventsOpen(false);
        setProfileOpen(false);
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, []);

  const tabs = [
    {id:"home",label:"Home",hasDropdown:true,hideArrow:true},
    {id:"opportunities",label:"Opportunities"},
    {id:"calendar",label:"Calendar"},
    {id:"profile",label:"My Profile"},
    {id:"community",label:"Community"},
    {id:"events",label:"Events & Travel",hasDropdown:true,hideArrow:true},
  ];

  const homeSubItems = [
    {id:"unpaid-internship",label:"Unpaid Internship Support"},
    {id:"meritfirst",label:"MeritFirst Exams"},
    {id:"finance-skills",label:"Finance Skills Development"},
  ];

  const eventSubItems = [
    {id:"event-aei",label:"AEI"},
    {id:"event-aha",label:"AHA Foundation"},
    {id:"event-austin-institute",label:"Austin Institute"},
    {id:"event-forge",label:"Coign & Forge"},
    {id:"event-pepperdine",label:"Pepperdine"},
    {id:"event-reagan",label:"Ronald Reagan Institute"},
    {id:"event-israel",label:"Study Abroad: Israel"},
    {id:"event-txse",label:"Texas Stock Exchange"},
  ];

  const isActive = (id) => {
    if (id === "home") return activeTab === "home";
    if (id === "events") return activeTab === "events";
    return activeTab === id && !subPage;
  };

  const handleTabClick = (tab) => {
    if (tab.id === "home") {
      setEventsOpen(false);
      if (activeTab === "home" && !subPage) {
        setHomeOpen(prev => !prev);
      } else {
        setHomeOpen(false);
        navigate("home");
      }
    } else if (tab.id === "events") {
      setHomeOpen(false);
      if (activeTab === "events" && !subPage) {
        setEventsOpen(prev => !prev);
      } else {
        setEventsOpen(false);
        navigate("events");
      }
    } else {
      setHomeOpen(false);
      setEventsOpen(false);
      navigate(tab.id);
    }
  };

  const handleSubClick = (id) => {
    setHomeOpen(false);
    setEventsOpen(false);
    navigate(id);
  };

  const dropdownStyle = {
    position:"absolute",top:"100%",left:0,backgroundColor:C.navy,border:"1px solid "+C.navyLight,

      {/* Left: Crest + Title */}
      <div style={{display:"flex",alignItems:"center",marginRight:32,flexShrink:0,cursor:"pointer"}} onClick={()=>navigate("home")}>
        <Crest/>
      </div>

      {/* Center: Tabs */}
      <nav style={{display:"flex",alignItems:"stretch",height:"100%",flex:1,justifyContent:"center",gap:0}}>
        {tabs.map(tab => {
          const active = isActive(tab.id);
          const showDropdown = (tab.id === "home" && homeOpen) || (tab.id === "events" && eventsOpen);
          const items = tab.id === "home" ? homeSubItems : tab.id === "events" ? eventSubItems : [];
          return (
            <div key={tab.id} style={{position:"relative",display:"flex",alignItems:"stretch"}}>
              <div onClick={()=>handleTabClick(tab)} style={{
                display:"flex",alignItems:"center",gap:6,padding:"0 18px",cursor:"pointer",
                fontSize:13,fontWeight:active?600:400,color:active?C.gold:C.cream+"bb",

                transition:"all 0.15s ease",letterSpacing:"0.3px",
                fontFamily:"'Libre Franklin', sans-serif",
              }}>
                {tab.label}
                {tab.hasDropdown && !tab.hideArrow && <span style={{fontSize:8,marginLeft:2,opacity:0.6}}>{showDropdown?"\u25B2":"\u25BC"}</span>}
              </div>
              {showDropdown && items.length > 0 && (
                <div style={dropdownStyle}>
                  {items.map(item => (
                    <div key={item.id} onClick={()=>handleSubClick(item.id)}
                      style={dropdownItemStyle(subPage===item.id)}
                      onMouseEnter={e=>e.target.style.backgroundColor=C.navyLight}
                      onMouseLeave={e=>e.target.style.backgroundColor="transparent"}

                  ))}
                </div>
              )}
            </div>
          );
        })}
      </nav>

      {/* Right: User */}
      <div style={{position:"relative",flexShrink:0}}>
        <div onClick={()=>setProfileOpen(p=>!p)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
          {currentUser?.avatar_url ? (
            <img src={currentUser.avatar_url} alt="" style={{width:32,height:32,borderRadius:"50%"}} referrerPolicy="no-referrer"/>
          ) : (
            <div style={{width:32,height:32,borderRadius:"50%",backgroundColor:C.goldMuted,display:"flex",alignItems:"center",justifyContent:"center",color:C.navy,fontSize:12,fontWeight:700}}>{(currentUser?.name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}</div>
          )}
          <div>
            <div style={{color:C.cream,fontSize:12,fontWeight:600}}>{currentUser?.name||"Student"}</div>

          </div>
          <span style={{color:C.cream+"88",fontSize:8,marginLeft:2}}>{profileOpen?"\u25B2":"\u25BC"}</span>
        </div>
        {profileOpen && (
          <div style={{position:"absolute",top:"100%",right:0,marginTop:4,backgroundColor:C.navy,border:"1px solid "+C.navyLight,minWidth:180,zIndex:20,boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>
            <div onClick={()=>{setProfileOpen(false);navigate("profile");}} style={{padding:"10px 20px",cursor:"pointer",fontSize:13,color:C.cream+"cc",borderBottom:"1px solid "+C.navyLight,transition:"all 0.15s ease"}} onMouseEnter={e=>e.target.style.backgroundColor=C.navyLight} onMouseLeave={e=>e.target.style.backgroundColor="transparent"}>My Profile</div>
            <div onClick={()=>{setProfileOpen(false);onSignOut();}} style={{padding:"10px 20px",cursor:"pointer",fontSize:13,color:C.alert,transition:"all 0.15s ease"}} onMouseEnter={e=>e.target.style.backgroundColor=C.navyLight} onMouseLeave={e=>e.target.style.backgroundColor="transparent"}>Sign Out</div>
          </div>
        )}

    </div>
  );

const OpportunitiesPage = ({navigate, showToast, savedOpps, setSavedOpps, selectedIndustries, serverOpps=[]}) => {
  const [search, setSearch] = useState("");
  const [filterInd, setFilterInd] = useState("All");
  const [filterType, setFilterType] = useState("All");
  const [sortBy, setSortBy] = useState("deadline");
  const [showSaved, setShowSaved] = useState(false);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({org:"",title:"",description:"",industry:"Finance & Banking",type:"Internship",location:"",deadline:"",paid:false,contactEmail:""});
  const [visibleIds, setVisibleIds] = useState(new Set());
  const cardRefs = useRef({});
  const sidebarItemRefs = useRef({});

  const allItemsRaw = [...serverOpps, ...INTERNSHIPS];
  const seenKeys = new Set();
  const allItems = allItemsRaw.filter(o => {
    const key = (o.org + "|" + o.title).toLowerCase();
    if (seenKeys.has(key)) return false;
    seenKeys.add(key);
    return true;
  });
  const availableIndustries = [...new Set(allItems.map(i => i.industry).filter(Boolean))];
  const availableTypes = [...new Set(allItems.map(i => i.type).filter(Boolean))];
  const filtered = allItems.filter(i => {
    if (showSaved && !savedOpps.includes(i.id)) return false;
    const ms = i.title.toLowerCase().includes(search.toLowerCase()) || i.org.toLowerCase().includes(search.toLowerCase());
    const mi = filterInd==="All" || i.industry===filterInd;
    const mt = filterType==="All" || i.type===filterType;
    return ms && mi && mt;
  }).sort((a,b) => {
    if (sortBy==="deadline") return new Date(a.deadline) - new Date(b.deadline);
    if (sortBy==="org") return a.org.localeCompare(b.org);
    if (sortBy==="title") return a.title.localeCompare(b.title);
    if (sortBy==="type") return a.type.localeCompare(b.type);
    return 0;
  });

  const toggleSave = (id) => setSavedOpps(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  const isSaved = (id) => savedOpps.includes(id);
  const matches = (ind) => selectedIndustries.includes(ind);

  const submitListing = () => {
    if (!form.org || !form.title) return;
    const newItem = {...form, featured:false, deadline:form.deadline||"2026-06-01"};
    api("/api/admin/opportunities", { method: "POST", body: JSON.stringify({ opportunity: newItem }) })
      .then(() => showToast("Your listing has been submitted!"))
      .catch(() => showToast("Submission failed — you may need admin access"));
    setForm({org:"",title:"",description:"",industry:"Finance & Banking",type:"Internship",location:"",deadline:"",paid:false,contactEmail:""});
    setShowModal(false);
  };

  // Track which cards are visible via IntersectionObserver
  useEffect(() => {
    const observer = new IntersectionObserver((entries) => {
      setVisibleIds(prev => {
        const next = new Set(prev);
        entries.forEach(e => {
          const id = e.target.dataset.oppId;
          if (e.isIntersecting) next.add(id); else next.delete(id);
        });
        return next;
      });
    }, { rootMargin: "-80px 0px -40% 0px", threshold: 0 });
    Object.values(cardRefs.current).forEach(el => { if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, [filtered.length, search, filterInd, filterType, sortBy, showSaved]);

  // Auto-scroll sidebar to first visible item
  useEffect(() => {
    if (visibleIds.size === 0) return;
    const firstVisible = filtered.find(item => visibleIds.has(String(item.id)));
    if (firstVisible && sidebarItemRefs.current[firstVisible.id]) {
      sidebarItemRefs.current[firstVisible.id].scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
  }, [visibleIds]);

  const scrollToCard = (id) => {
    const el = cardRefs.current[id];
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  const typeTip = {Internship:"Short-term work experience, typically 1 semester or summer",Fellowship:"Competitive program with stipend, mentorship, and structured curriculum",Program:"Training, placement, or certification-based opportunity"};
  const sel = {padding:"8px 12px",border:"1px solid "+C.border,backgroundColor:C.white,fontSize:13,color:C.text,fontFamily:"'Libre Franklin', sans-serif",cursor:"pointer",minWidth:160};
  const inputStyle = {width:"100%",padding:8,border:"1px solid "+C.border,fontSize:13,boxSizing:"border-box",fontFamily:"'Libre Franklin', sans-serif"};

  return (
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{display:"flex",alignItems:"stretch",minHeight:"calc(100vh - 72px)"}}>
        {/* Sidebar — full-height nav */}
        <div data-lenis-prevent style={{width:260,flexShrink:0,backgroundColor:C.navy,overflowY:"auto",position:"sticky",top:72,height:"calc(100vh - 72px)",padding:"20px 0",borderRight:"1px solid "+C.navyLight}}>
          <div style={{padding:"0 20px 14px",borderBottom:"1px solid "+C.navyLight,marginBottom:6}}>
            <div style={{fontSize:14,fontWeight:700,color:C.cream,letterSpacing:"0.3px"}}>Opportunities</div>
            <div style={{fontSize:11,color:C.goldLight,marginTop:3}}>{filtered.length} listed</div>
          </div>
          {filtered.map(item => {
            const isVis = visibleIds.has(String(item.id));
            return (
            <div key={item.id} ref={el=>sidebarItemRefs.current[item.id]=el} onClick={()=>item.subPage?navigate(item.subPage):scrollToCard(item.id)} style={{padding:"9px 20px",cursor:"pointer",transition:"all 0.2s",display:"flex",alignItems:"center",gap:10,backgroundColor:isVis?C.navyLight:"transparent",borderLeft:isVis?"3px solid "+C.gold:"3px solid transparent"}} onMouseEnter={e=>{if(!isVis)e.currentTarget.style.backgroundColor=C.navyLight+"88";}} onMouseLeave={e=>{if(!isVis)e.currentTarget.style.backgroundColor="transparent";}}>
              {item.logo ? (
